<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>«我也想不到啊！» 遊戲攻略</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=DotGothic16&display=swap');
        :root {
            --joker-purple: #6b46c1;
            --joker-pink: #d53f8c;
            --joker-cyan: #0bc5ea;
        }
        body {
            background-color: #05000a;
            color: #e2e8f0;
            font-family: 'DotGothic16', "Microsoft JhengHei", sans-serif;
            overflow-x: hidden;
            cursor: none !important; 
            margin: 0;
            width: 100vw;
            height: 100vh;
        }

        #cockroach-cursor {
            position: fixed;
            width: 50px;
            height: 50px;
            font-size: 40px;
            pointer-events: none;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
            line-height: 1;
            transform-origin: center center;
        }

        .unified-header {
            font-family: 'Noto Serif TC', "cwTeXQKai", "STKaiti", "Microsoft JhengHei", serif;
            font-weight: 900;
            background: linear-gradient(to bottom, #ffffff 30%, var(--joker-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(213, 63, 140, 0.6));
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-style: italic;
        }

        .title-font {
            font-family: 'Ma Shan Zheng', cursive;
        }
        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% {
                opacity: 0.99;
                text-shadow: -2px -2px 0 var(--joker-cyan), 2px 2px 0 var(--joker-pink);
            }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% {
                opacity: 0.4;
                text-shadow: none;
            }
        }
        .flicker-text {
            animation: flicker 3s infinite;
        }
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: .05;
            z-index: 9999;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC42NSIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNuKSIvPjwvc3ZnPg==');
        }
        .joker-instance {
            position: fixed;
            width: 100px;
            z-index: 100; 
            filter: drop-shadow(0 0 10px var(--joker-purple));
            pointer-events: none;
            will-change: transform;
            backface-visibility: hidden;
        }
        .dead-red {
            filter: brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7454%) hue-rotate(0deg) brightness(100%) contrast(115%) !important;
            opacity: 1 !important;
        }

        .ritual-box {
            background: rgba(45, 10, 80, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid var(--joker-purple);
            box-shadow: 0 0 20px rgba(107, 70, 193, 0.2);
        }
        #static-content {
            position: relative;
            z-index: 10; 
        }
        #swarm-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25000;
        }
        .swarm-cockroach {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            will-change: transform;
            line-height: 1;
            display: none;
            backface-visibility: hidden;
        }
        
        a, button, img {
            cursor: none !important;
        }
    </style>
</head>
<body>
<div class="noise"></div>
<div id="cockroach-cursor">🪳</div>

<div id="joker-army-container"></div>
<div id="swarm-container"></div>

<div id="static-content" class="max-w-4xl mx-auto px-4 py-12 relative">
    <header class="text-center mb-20">
        <h1 class="text-6xl md:text-9xl unified-header text-white mb-4 flicker-text">海之宮教會</h1>
        <p class="text-xl text-cyan-400 tracking-widest uppercase">Umimiya Natsu is the Joker</p>
        <div class="mt-8 border-4 border-purple-900 p-2 inline-block bg-black rounded-xl shadow-[0_0_40px_rgba(107,70,193,0.5)]">
            <img src="1.webp" alt="海宮夏聖像" class="w-full max-w-lg mx-auto" onerror="this.src='https://via.placeholder.com/500x300?text=IMAGE+1'">
        </div>
    </header>
    <main class="space-y-24">
        <section class="ritual-box p-8 rounded-lg">
            <h2 class="text-3xl text-pink-400 mb-6 border-b border-pink-900 pb-2">海鹽信條</h2>
            <div class="grid md:grid-cols-2 gap-8 items-center">
                <div class="space-y-6 text-lg">
                    <p class="hover:text-cyan-400 transition-colors">1. 我們皆為海宮夏的「海鹽」，鹹是我們的本質。</p>
                    <p class="hover:text-cyan-400 transition-colors">2. 海宮夏的面具下，藏著宇宙的真理──「小丑」。</p>
                    <p class="hover:text-cyan-400 transition-colors">3. 我也想不到啊！</p>
                    <p class="hover:text-cyan-400 transition-colors">4. 百合最高！</p>
                    <p class="hover:text-cyan-400 transition-colors">5. 沒有所謂攻略，只有遵守信條。</p>
                </div>
                <div class="relative overflow-hidden border-2 border-pink-900 rounded-lg bg-black shadow-[0_0_20px_rgba(213,63,140,0.3)]">
                    <img src="2.webp" alt="真理之眼" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x400?text=IMAGE+2'">
                </div>
            </div>
        </section>
        <section class="text-center bg-white/5 py-16 rounded-3xl border border-white/10">
            <h2 class="text-4xl mb-8 flicker-text title-font">神使海宮夏</h2>
            <div class="flex justify-center flex-col items-center">
                <img src="4.webp" alt="神使聖像" class="w-80 filter drop-shadow-[0_0_30px_rgba(213,63,140,0.8)]" onerror="this.src='https://via.placeholder.com/300x400?text=IMAGE+4'">
                <p class="mt-8 text-cyan-500 text-2xl font-bold">海鹽們，感受到這份小丑力了嗎？</p>
            </div>
        </section>
    </main>
    <footer class="mt-32 text-center border-t border-gray-800 pt-8 pb-12">
        <div class="mt-4 flex justify-center gap-4 opacity-30 text-[10px]">
            <span>蛤</span><span>蛤</span><span>蛤</span><span>蛤</span><span>蛤</span><span>蛤</span><span>蛤</span>
        </div>
    </footer>
</div>

<script>
    const jokerCount = 66; 
    const container = document.getElementById('joker-army-container');
    const swarmContainer = document.getElementById('swarm-container');
    const cursorCockroach = document.getElementById('cockroach-cursor');
    const cursorStyle = cursorCockroach.style;
    const jokers = [];
    
    let swarmPool = [];
    let activeSwarm = [];
    let mX = -2000;
    let mY = -2000;
    let prevMX = 0;
    let prevMY = 0;
    let cursorAngle = 0;
    let isSwarming = false;
    let swarmStartTime = 0;

    function createSwarmElement() {
        const span = document.createElement('span');
        span.innerText = '🪳';
        span.className = 'swarm-cockroach';
        swarmContainer.appendChild(span);
        return {
            element: span,
            elStyle: span.style,
            active: false,
            x: 0, y: 0, dx: 0, dy: 0, angle: 0,
            hasEntered: false
        };
    }

    function initJokerArmy() {
        for (let i = 0; i < jokerCount; i++) {
            const img = document.createElement('img');
            img.src = '3.webp';
            img.className = 'joker-instance';
            const clone = img.cloneNode();
            container.appendChild(img);
            container.appendChild(clone);

            jokers.push({
                element: img, elStyle: img.style,
                clone: clone, clStyle: clone.style,
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                dx: (Math.random() - 0.5) * 10, 
                dy: (Math.random() - 0.5) * 10,
                angle: Math.random() * 360,
                rotationSpeed: (Math.random() - 0.5) * 10,
                dead: false,
                gravity: 0.8 + Math.random() * 0.4
            });
        }

        for (let i = 0; i < 1000; i++) {
            swarmPool.push(createSwarmElement());
        }
    }

    function spawnFromAnywhere() {
        let data = swarmPool.find(item => !item.active);
        if (!data) {
            data = createSwarmElement();
            swarmPool.push(data);
        }

        const w = window.innerWidth;
        const h = window.innerHeight;
        let x, y;
        
        const side = Math.floor(Math.random() * 4);
        const margin = 50;
        if (side === 0) { x = -margin; y = Math.random() * h; }
        else if (side === 1) { x = w + margin; y = Math.random() * h; }
        else if (side === 2) { x = Math.random() * w; y = -margin; }
        else { x = Math.random() * w; y = h + margin; }
        
        const angleToCenter = Math.atan2(h/2 - y, w/2 - x);
        const spreadAngle = angleToCenter + (Math.random() - 0.5) * 1.5; 
        const speed = 3 + Math.random() * 8;

        data.active = true;
        data.hasEntered = false;
        data.x = x;
        data.y = y;
        data.dx = Math.cos(spreadAngle) * speed;
        data.dy = Math.sin(spreadAngle) * speed;
        data.angle = spreadAngle * 180 / Math.PI + 90;
        data.elStyle.display = 'inline-block';
        
        activeSwarm.push(data);
    }

    function updateCursor() {
        const deltaX = mX - prevMX;
        const deltaY = mY - prevMY;
        if (Math.abs(deltaX) > 0.5 || Math.abs(deltaY) > 0.5) {
            cursorAngle = Math.atan2(deltaY, deltaX) * 180 / Math.PI + 90;
        }
        cursorStyle.transform = `translate3d(${mX - 25}px, ${mY - 25}px, 0) rotate(${cursorAngle}deg)`;
        prevMX = mX;
        prevMY = mY;
    }

    function animate(time) {
        updateCursor();
        const w = window.innerWidth;
        const h = window.innerHeight;
        const size = 100;
        
        let aliveCount = 0;
        for (let i = 0; i < jokers.length; i++) {
            const j = jokers[i];
            if (j.dead) {
                j.clStyle.display = 'none';
                if (j.y < h - size) {
                    j.dy += j.gravity;
                    j.y += j.dy;
                    j.elStyle.transform = `translate3d(${j.x}px, ${j.y}px, 0) rotate(${j.angle}deg)`;
                }
                continue;
            }
            aliveCount++;
            j.x += j.dx; j.y += j.dy;
            if (j.x < -size) j.x += w + size;
            if (j.x > w) j.x -= w + size;
            if (j.y < 0) { j.y = 0; j.dy *= -1; }
            else if (j.y > h - size) { j.y = h - size; j.dy *= -1; }

            const dx = (j.x + 50) - mX;
            const dy = (j.y + 50) - mY;
            const distSq = dx * dx + dy * dy;

            if (distSq < 4225) { // 65^2
                j.dead = true; j.dy = 1;
                j.element.classList.add('dead-red');
                j.element.style.zIndex = '50';
            } else if (distSq < 48400) { // 220^2
                const dist = Math.sqrt(distSq);
                const ang = Math.atan2(dy, dx);
                const spd = 25 + ((220 - dist) / 220) * 45; 
                j.dx = Math.cos(ang) * spd; j.dy = Math.sin(ang) * spd;
            }
            j.dx *= 0.95; j.dy *= 0.95; j.angle += j.rotationSpeed;
            j.elStyle.transform = `translate3d(${j.x}px, ${j.y}px, 0) rotate(${j.angle}deg)`;
            
            let cloneX = j.x;
            if (j.x > w - size) { cloneX = j.x - (w + size); j.clStyle.display = 'block'; }
            else if (j.x < 0) { cloneX = j.x + (w + size); j.clStyle.display = 'block'; }
            else { j.clStyle.display = 'none'; }
            j.clStyle.transform = `translate3d(${cloneX}px, ${j.y}px, 0) rotate(${j.angle}deg)`;
        }

        if (aliveCount === 0 && !isSwarming) {
            isSwarming = true;
            swarmStartTime = time;
        }

        if (isSwarming) {
            const elapsed = (time - swarmStartTime) / 1000;
            let spawnRate = Math.min(60, 2 + Math.pow(elapsed, 2.8) * 0.1);
            
            for(let k=0; k < spawnRate; k++) {
                spawnFromAnywhere();
            }

            for (let i = 0; i < activeSwarm.length; i++) {
                const s = activeSwarm[i];
                s.x += s.dx;
                s.y += s.dy;

                const pad = 20;
                if (!s.hasEntered) {
                    if (s.x > 0 && s.x < w - pad && s.y > 0 && s.y < h - pad) {
                        s.hasEntered = true;
                    }
                }

                if (s.hasEntered) {
                    if (s.x < 0 || s.x > w - pad) {
                        s.dx *= -1;
                        s.x = Math.max(0, Math.min(w - pad, s.x));
                    }
                    if (s.y < 0 || s.y > h - pad) {
                        s.dy *= -1;
                        s.y = Math.max(0, Math.min(h - pad, s.y));
                    }
                }

                if (Math.random() < 0.02) { 
                    const angle = Math.atan2(s.dy, s.dx) + (Math.random() - 0.5) * 1.5;
                    const speed = 6 + Math.random() * 8;
                    s.dx = Math.cos(angle) * speed;
                    s.dy = Math.sin(angle) * speed;
                    s.angle = angle * 180 / Math.PI + 90;
                }
                s.elStyle.transform = `translate3d(${s.x}px, ${s.y}px, 0) rotate(${s.angle}deg)`;
            }
        }
        requestAnimationFrame(animate);
    }

    document.addEventListener('mousemove', (e) => {
        mX = e.clientX;
        mY = e.clientY;
    });

    window.onload = () => {
        initJokerArmy();
        requestAnimationFrame(animate);
    };
</script>
</body>
</html>
