<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>«我也想不到啊！» 遊戲攻略</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=DotGothic16&display=swap');
        :root {
            --joker-purple: #6b46c1;
            --joker-pink: #d53f8c;
            --joker-cyan: #0bc5ea;
        }
        body {
            background-color: #05000a;
            color: #e2e8f0;
            font-family: 'DotGothic16', "Microsoft JhengHei", sans-serif;
            overflow-x: hidden;
            cursor: none; 
            margin: 0;
            width: 100vw;
            height: 100vh;
        }
        .title-font {
            font-family: 'Ma Shan Zheng', cursive;
        }
        .mystic-font {
            font-family: 'Zhi Mang Xing', cursive;
        }
        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% {
                opacity: 0.99;
                text-shadow: -2px -2px 0 var(--joker-cyan), 2px 2px 0 var(--joker-pink);
            }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% {
                opacity: 0.4;
                text-shadow: none;
            }
        }
        .flicker-text {
            animation: flicker 3s infinite;
        }
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: .05;
            z-index: 9999;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC42NSIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNuKSIvPjwvc3ZnPg==');
        }
        .joker-instance {
            position: fixed;
            width: 100px;
            z-index: 100; 
            filter: drop-shadow(0 0 10px var(--joker-purple));
            pointer-events: none;
            will-change: transform;
        }
        #cockroach-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            z-index: 30000; 
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
            transform: translate3d(-100px, -100px, 0);
        }
        .ritual-box {
            background: rgba(45, 10, 80, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid var(--joker-purple);
            box-shadow: 0 0 20px rgba(107, 70, 193, 0.2);
        }
        #static-content {
            position: relative;
            z-index: 10; 
        }
        #swarm-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25000; /* 高於內容，低於游標 */
        }
        .swarm-cockroach {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            will-change: transform;
            line-height: 1;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="noise"></div>
<div id="cockroach-cursor">
    <span style="font-size: 30px;">🪳</span>
</div>
<div id="joker-army-container"></div>
<div id="swarm-container"></div>
<div id="static-content" class="max-w-4xl mx-auto px-4 py-12 relative">
    <header class="text-center mb-20">
        <h1 class="text-6xl md:text-9xl title-font text-pink-500 mb-4 flicker-text">海之宮教會</h1>
        <p class="text-xl text-cyan-400 tracking-widest uppercase">Umimiya Natsu is the Joker</p>
        <div class="mt-8 border-4 border-purple-900 p-2 inline-block bg-black rounded-xl shadow-[0_0_40px_rgba(107,70,193,0.5)]">
            <img src="1.webp" alt="海宮夏聖像" class="w-full max-w-lg mx-auto" onerror="this.src='https://via.placeholder.com/500x300?text=IMAGE+1'">
        </div>
    </header>
    <main class="space-y-24">
        <section class="ritual-box p-8 rounded-lg">
            <h2 class="text-3xl text-pink-400 mb-6 border-b border-pink-900 pb-2">海鹽信條</h2>
            <div class="grid md:grid-cols-2 gap-8 items-center">
                <div class="space-y-6 text-lg">
                    <p class="hover:text-cyan-400 transition-colors">1. 我們皆為海宮夏的「海鹽」，鹹是我們的本質。</p>
                    <p class="hover:text-cyan-400 transition-colors">2. 海宮夏的面具下，藏著宇宙的真理──「小丑」。</p>
                    <p class="hover:text-cyan-400 transition-colors">3. 我也想不到啊！</p>
                    <p class="hover:text-cyan-400 transition-colors">4. 百合最高！</p>
                    <p class="hover:text-cyan-400 transition-colors">5. 沒有所謂攻略，只有遵守信條。</p>
                </div>
                <div class="relative overflow-hidden border-2 border-pink-900 rounded-lg bg-black shadow-[0_0_20px_rgba(213,63,140,0.3)]">
                    <img src="2.webp" alt="真理之眼" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x400?text=IMAGE+2'">
                </div>
            </div>
        </section>
        <section class="text-center bg-white/5 py-16 rounded-3xl border border-white/10">
            <h2 class="text-4xl mb-8 flicker-text title-font">神使海宮夏</h2>
            <div class="flex justify-center flex-col items-center">
                <img src="4.webp" alt="神使聖像" class="w-80 filter drop-shadow-[0_0_30px_rgba(213,63,140,0.8)]" onerror="this.src='https://via.placeholder.com/300x400?text=IMAGE+4'">
                <p class="mt-8 text-cyan-500 text-2xl font-bold">海鹽們，感受到這份小丑力了嗎？</p>
            </div>
        </section>
    </main>
    <footer class="mt-32 text-center border-t border-gray-800 pt-8 pb-12">
        <div class="mt-4 flex justify-center gap-4 opacity-30 text-[10px]">
            <span>蛤</span><span>蛤</span><span>蛤</span><span>蛤</span><span>蛤</span><span>蛤</span><span>蛤</span>
        </div>
    </footer>
</div>
<script>
    const jokerCount = 66; 
    const container = document.getElementById('joker-army-container');
    const swarmContainer = document.getElementById('swarm-container');
    const cockroachCursor = document.getElementById('cockroach-cursor');
    const jokers = [];
    const swarm = []; 
    let mX = -2000;
    let mY = -2000;
    let isSwarming = false;
    let swarmInterval = null;
    function initJokerArmy() {
        for (let i = 0; i < jokerCount; i++) {
            const img = document.createElement('img');
            img.src = '3.webp';
            img.className = 'joker-instance';
            img.onerror = function() { 
                this.style.display = 'none'; 
                const span = document.createElement('span');
                span.innerText = '🤡';
                span.style.fontSize = '50px';
                span.style.position = 'fixed';
                span.className = 'joker-instance';
                container.appendChild(span);
                jokers[i].element = span;
            };  
            const jokerData = {
                element: img,
                x: Math.random() * (window.innerWidth - 100),
                y: Math.random() * (window.innerHeight - 100),
                dx: (Math.random() - 0.5) * 15, 
                dy: (Math.random() - 0.5) * 15,
                angle: Math.random() * 360,
                rotationSpeed: (Math.random() - 0.5) * 10,
                dead: false,
                gravity: 0.8 + Math.random() * 0.4
            };
            container.appendChild(img);
            jokers.push(jokerData);
        }
    }
    function createSwarmCockroach() {
        const span = document.createElement('span');
        span.innerText = '🪳';
        span.className = 'swarm-cockroach';
        const w = window.innerWidth;
        const h = window.innerHeight;
        let x, y;
        const side = Math.floor(Math.random() * 4);
        const margin = 50;
        if(side === 0) { x = -margin; y = Math.random() * h; }
        else if(side === 1) { x = w + margin; y = Math.random() * h; }
        else if(side === 2) { x = Math.random() * w; y = -margin; }
        else { x = Math.random() * w; y = h + margin; }
        const centerX = w / 2;
        const centerY = h / 2;
        const angleToCenter = Math.atan2(centerY - y, centerX - x);
        const spreadAngle = angleToCenter + (Math.random() - 0.5) * 1.5; 
        const speed = 1.2 + Math.random() * 2.5;
        const data = {
            element: span,
            x: x,
            y: y,
            dx: Math.cos(spreadAngle) * speed,
            dy: Math.sin(spreadAngle) * speed,
            angle: spreadAngle * 180 / Math.PI + 90
        };
        swarmContainer.appendChild(span);
        swarm.push(data);
    }
    function startSwarm() {
        isSwarming = true;
        swarmInterval = setInterval(() => {
            for(let i=0; i<4; i++) createSwarmCockroach();
        }, 80);
    }
    function animate() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const fearRadius = 160; 
        const killRadius = 55; 
        const size = 100;
        cockroachCursor.style.transform = `translate3d(${mX}px, ${mY}px, 0) translate(-50%, -50%)`;
        let aliveCount = 0;
        for (let i = 0; i < jokers.length; i++) {
            const j = jokers[i];
            if (j.dead) {
                if (j.y < h - size) {
                    j.dy += j.gravity;
                    j.y += j.dy;
                    j.element.style.transform = `translate3d(${j.x}px, ${j.y}px, 0) rotate(${j.angle}deg)`;
                }
                continue;
            }
            aliveCount++;
            j.x += j.dx;
            j.y += j.dy;
            const cX = j.x + size / 2;
            const cY = j.y + size / 2;
            const dx = cX - mX;
            const dy = cY - mY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < killRadius) {
                j.dead = true;
                j.dy = 1;
                j.element.style.filter = 'brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7454%) hue-rotate(0deg)';
                j.element.style.zIndex = '50'; 
            } else if (dist < fearRadius) {
                const ang = Math.atan2(dy, dx);
                const spd = 12 + Math.random() * 18; 
                j.dx = Math.cos(ang) * spd;
                j.dy = Math.sin(ang) * spd;
            }
            if (j.x < 0 || j.x > w - size) j.dx *= -1;
            if (j.y < 0 || j.y > h - size) j.dy *= -1;
            j.dx *= 0.97;
            j.dy *= 0.97;
            j.angle += j.rotationSpeed;
            j.element.style.transform = `translate3d(${j.x}px, ${j.y}px, 0) rotate(${j.angle}deg)`;
        }
        if (aliveCount === 0 && !isSwarming) {
            startSwarm();
        }
        if (isSwarming) {
            for (let i = 0; i < swarm.length; i++) {
                const s = swarm[i];
                s.x += s.dx;
                s.y += s.dy;
                if (Math.random() < 0.03) {
                    const angleJitter = (Math.random() - 0.5) * 0.5;
                    const currentAngle = Math.atan2(s.dy, s.dx) + angleJitter;
                    const speed = Math.sqrt(s.dx*s.dx + s.dy*s.dy);
                    s.dx = Math.cos(currentAngle) * speed;
                    s.dy = Math.sin(currentAngle) * speed;
                    s.angle = currentAngle * 180 / Math.PI + 90;
                }
                if (s.x < -200 || s.x > w + 200 || s.y < -200 || s.y > h + 200) {
                     const ang = Math.atan2(h/2 - s.y, w/2 - s.x);
                     s.dx = Math.cos(ang) * 2;
                     s.dy = Math.sin(ang) * 2;
                     s.angle = ang * 180 / Math.PI + 90;
                }
                s.element.style.transform = `translate3d(${s.x}px, ${s.y}px, 0) rotate(${s.angle}deg)`;
            }
        }
        requestAnimationFrame(animate);
    }
    document.addEventListener('mousemove', (e) => {
        mX = e.clientX;
        mY = e.clientY;
    });
    window.onload = () => {
        initJokerArmy();
        requestAnimationFrame(animate);
    };
</script>
</body>
</html>
